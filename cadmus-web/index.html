<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22 /><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2270%22 font-family=%22sans-serif%22 font-weight=%22900%22 fill=%22white%22>C</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    
    <!-- ONNX Runtime Web CDN -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.23.2/dist/ort.min.js"></script>
    
    <title>Cadmus | App</title>

    <script>
      // --- CRITICAL_ERROR_DIAGNOSTIC_TOOL ---
      window.onerror = function(msg, url, line, col, error) {
        var errorBox = document.createElement('div');
        errorBox.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:black;color:#AF3A03;padding:40px;font-family:monospace;z-index:9999;overflow:auto;';
        errorBox.innerHTML = '<h1>FATAL_INITIALIZATION_ERROR</h1>' +
          '<p>MESSAGE: ' + msg + '</p>' +
          '<p>SOURCE: ' + url + '</p>' +
          '<p>LINE: ' + line + ' COL: ' + col + '</p>' +
          '<pre style="color:white;background:#111;padding:20px;margin-top:20px;border:1px solid #333;">' + (error && error.stack ? error.stack : 'No stack trace available') + '</pre>' +
          '<p style="margin-top:20px;opacity:0.5;">CADMUS_SOVEREIGN_DEBUGGER_v1.0</p>';
        document.body.appendChild(errorBox);
      };
    </script>
  </head>
  <body class="bg-base text-text selection:bg-accent/30 antialiased font-sans transition-colors duration-300 paper-texture">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
